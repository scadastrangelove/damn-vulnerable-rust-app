name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - run: python scripts/verify-layout.py
      - run: docker compose -f infrastructure/compose.yaml -f infrastructure/compose.ssrf.yaml --profile ssrf-lab config >/dev/null
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo test -p dvra-unsafe-cache --features loom-tests loom_detects_data_race --locked
