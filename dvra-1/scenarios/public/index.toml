# Learner-facing scenario index for DVRA-1.
#
# This file intentionally contains only learner-facing prompts. Instructor
# truth lives in ../../instructor-oracle/.

target = "damn-vulnerable-rust"
private_truth = "withheld"

[[scenario]]
id = "DVR-01"
title = "User search data access"
feature = "user_search"
prompt = "Review how user-controlled search criteria flow into the data-access layer."
allowed_tools = ["manual-review", "unit-tests"]
expected_artifact = "security review note with evidence"

