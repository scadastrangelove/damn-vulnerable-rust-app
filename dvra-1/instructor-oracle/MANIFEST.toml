# Machine-readable finding map for the Damn Vulnerable Rust target.
#
# One [[finding]] per planted issue. Fields:
#   id                     stable identifier
#   feature                module under src/features/
#   file, vuln_line        location of the primary defect
#   cwe                    CWE identifier
#   category               taxonomy bucket (see below)
#   reachable              true  = exploitable from a routed request under the
#                                  stated threat model
#                          false = decoy: not on the attacker path
#                          cond  = depends on threat-model assumptions
#   static_visible         a competent grep/SAST pass flags the *pattern*
#   fuzz_visible           a fuzzer/Miri triggers it; static triage does not
#   panic                  triggering it aborts the request/process
#   fixed_fn               the hardened counterpart in the same module
#   doc_ref                section of "Rust Security Code Review — Canonical"
#
# Categories:
#   reachable-real          genuinely exploitable
#   decoy-unreachable       looks vulnerable, is not on the path
#   fuzz-only               static-clean, needs fuzzing/Miri to see
#   threat-model-dependent  a finding only under certain trust assumptions

target = "damn-vulnerable-rust"
not_for_production = true

